name: archive-hourly-product-sessions

on:
  workflow_dispatch:
  schedule:
    # 01:00 IST daily -> 19:30 UTC previous day
    - cron: '30 19 * * *'

jobs:
  archive-and-purge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Archive expired data to S3
        env:
          # Optional: API-based brand loading (preferred). If set, scripts will ignore TOTAL_CONFIG_COUNT/DB_*_i.
          GET_BRANDS_API: ${{ secrets.GET_BRANDS_API }}
          PIPELINE_AUTH_HEADER: ${{ secrets.PIPELINE_AUTH_HEADER }}
          PASSWORD_AES_KEY: ${{ secrets.PASSWORD_AES_KEY }}

          TOTAL_CONFIG_COUNT: ${{ secrets.TOTAL_CONFIG_COUNT }}
          BRAND_TAG_0: ${{ secrets.BRAND_TAG_0 }}
          DB_HOST_0: ${{ secrets.DB_HOST_0 }}
          DB_USER_0: ${{ secrets.DB_USER_0 }}
          DB_PASSWORD_0: ${{ secrets.DB_PASSWORD_0 }}
          DB_DATABASE_0: ${{ secrets.DB_DATABASE_0 }}
          BRAND_TAG_1: ${{ secrets.BRAND_TAG_1 }}
          DB_HOST_1: ${{ secrets.DB_HOST_1 }}
          DB_USER_1: ${{ secrets.DB_USER_1 }}
          DB_PASSWORD_1: ${{ secrets.DB_PASSWORD_1 }}
          DB_DATABASE_1: ${{ secrets.DB_DATABASE_1 }}
          BRAND_TAG_2: ${{ secrets.BRAND_TAG_2 }}
          DB_HOST_2: ${{ secrets.DB_HOST_2 }}
          DB_USER_2: ${{ secrets.DB_USER_2 }}
          DB_PASSWORD_2: ${{ secrets.DB_PASSWORD_2 }}
          DB_DATABASE_2: ${{ secrets.DB_DATABASE_2 }}
          BRAND_TAG_3: ${{ secrets.BRAND_TAG_3 }}
          DB_HOST_3: ${{ secrets.DB_HOST_3 }}
          DB_USER_3: ${{ secrets.DB_USER_3 }}
          DB_PASSWORD_3: ${{ secrets.DB_PASSWORD_3 }}
          DB_DATABASE_3: ${{ secrets.DB_DATABASE_3 }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS: ${{ vars.HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS || '7' }}
        run: |
          if [ -z "$AWS_S3_BUCKET" ]; then
            echo "Missing required secret: AWS_S3_BUCKET"
            exit 1
          fi
          node scripts/archive-hourly-product-sessions.js

      - name: Purge archived data from MySQL
        env:
          # Optional: API-based brand loading (preferred). If set, scripts will ignore TOTAL_CONFIG_COUNT/DB_*_i.
          GET_BRANDS_API: ${{ secrets.GET_BRANDS_API }}
          PIPELINE_AUTH_HEADER: ${{ secrets.PIPELINE_AUTH_HEADER }}
          PASSWORD_AES_KEY: ${{ secrets.PASSWORD_AES_KEY }}

          TOTAL_CONFIG_COUNT: ${{ secrets.TOTAL_CONFIG_COUNT }}
          BRAND_TAG_0: ${{ secrets.BRAND_TAG_0 }}
          DB_HOST_0: ${{ secrets.DB_HOST_0 }}
          DB_USER_0: ${{ secrets.DB_USER_0 }}
          DB_PASSWORD_0: ${{ secrets.DB_PASSWORD_0 }}
          DB_DATABASE_0: ${{ secrets.DB_DATABASE_0 }}
          BRAND_TAG_1: ${{ secrets.BRAND_TAG_1 }}
          DB_HOST_1: ${{ secrets.DB_HOST_1 }}
          DB_USER_1: ${{ secrets.DB_USER_1 }}
          DB_PASSWORD_1: ${{ secrets.DB_PASSWORD_1 }}
          DB_DATABASE_1: ${{ secrets.DB_DATABASE_1 }}
          BRAND_TAG_2: ${{ secrets.BRAND_TAG_2 }}
          DB_HOST_2: ${{ secrets.DB_HOST_2 }}
          DB_USER_2: ${{ secrets.DB_USER_2 }}
          DB_PASSWORD_2: ${{ secrets.DB_PASSWORD_2 }}
          DB_DATABASE_2: ${{ secrets.DB_DATABASE_2 }}
          BRAND_TAG_3: ${{ secrets.BRAND_TAG_3 }}
          DB_HOST_3: ${{ secrets.DB_HOST_3 }}
          DB_USER_3: ${{ secrets.DB_USER_3 }}
          DB_PASSWORD_3: ${{ secrets.DB_PASSWORD_3 }}
          DB_DATABASE_3: ${{ secrets.DB_DATABASE_3 }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS: ${{ vars.HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS || '7' }}
        run: node scripts/purge-hourly-product-sessions.js
