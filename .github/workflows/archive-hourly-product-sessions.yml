name: archive-hourly-product-sessions

on:
  workflow_dispatch:
  schedule:
    # 01:00 IST daily -> 19:30 UTC previous day
    - cron: '30 19 * * *'

jobs:
  archive-and-purge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: analytics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Archive expired data to S3
        env:
          # Required: API-based brand loading (scripts are API-only).
          GET_BRANDS_API: ${{ secrets.GET_BRANDS_API }}
          PIPELINE_AUTH_HEADER: ${{ secrets.PIPELINE_AUTH_HEADER }}
          PASSWORD_AES_KEY: ${{ secrets.PASSWORD_AES_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS: ${{ vars.HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS || '7' }}
        run: |
          if [ -z "$GET_BRANDS_API" ]; then
            echo "Missing required secret: GET_BRANDS_API"
            exit 1
          fi
          if [ -z "$PIPELINE_AUTH_HEADER" ]; then
            echo "Missing required secret: PIPELINE_AUTH_HEADER"
            exit 1
          fi
          if [ -z "$PASSWORD_AES_KEY" ]; then
            echo "Missing required secret: PASSWORD_AES_KEY"
            exit 1
          fi
          if [ -z "$AWS_S3_BUCKET" ]; then
            echo "Missing required secret: AWS_S3_BUCKET"
            exit 1
          fi
          node scripts/archive-hourly-product-sessions.js

      - name: Purge archived data from MySQL
        env:
          # Required: API-based brand loading (scripts are API-only).
          GET_BRANDS_API: ${{ secrets.GET_BRANDS_API }}
          PIPELINE_AUTH_HEADER: ${{ secrets.PIPELINE_AUTH_HEADER }}
          PASSWORD_AES_KEY: ${{ secrets.PASSWORD_AES_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS: ${{ vars.HOURLY_PRODUCT_SESSIONS_RETENTION_DAYS || '7' }}
        run: |
          if [ -z "$GET_BRANDS_API" ]; then
            echo "Missing required secret: GET_BRANDS_API"
            exit 1
          fi
          if [ -z "$PIPELINE_AUTH_HEADER" ]; then
            echo "Missing required secret: PIPELINE_AUTH_HEADER"
            exit 1
          fi
          if [ -z "$PASSWORD_AES_KEY" ]; then
            echo "Missing required secret: PASSWORD_AES_KEY"
            exit 1
          fi
          if [ -z "$AWS_S3_BUCKET" ]; then
            echo "Missing required secret: AWS_S3_BUCKET"
            exit 1
          fi
          node scripts/purge-hourly-product-sessions.js
